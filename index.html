<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NakedCanvas — v0.1.0 demo</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0a0a;
        overflow: hidden;
      }
      #stage {
        position: fixed;
        inset: 0;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas id="scene"></canvas>
    </div>
    <script type="module">
      import { NakedCanvas } from "./src/index.ts";

      const canvas = document.getElementById("scene");
      const engine = new NakedCanvas(canvas, { defaultColor: "#00e5ff" });
      engine.renderText("NAKED");
    </script>
  </body>
</html>
